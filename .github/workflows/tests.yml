name: Node.js CI - Numerología

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          # Eliminamos la línea de cache: 'npm' para evitar el error

      - name: Pruebas del Backend (Mongo)
        run: |
          cd mongo
          npm install
          npm test

      - name: Pruebas del Frontend (NumFront)
        run: |
          cd numFront
          npm install
          npm test
